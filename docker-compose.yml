services:
  # === Infrastructure ===
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # === Application Services ===
  auth-service:
    build:
      context: .
      dockerfile: authService/Dockerfile
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      SALT: ${SALT}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:5001/api/v1/auth/google/callback
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      RABBITMQ_URL: amqp://rabbitmq:5672
      REDIS_URL: redis://redis:6379
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: authentication_service_db_project
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  flight-service:
    build:
      context: .
      dockerfile: flightSearchService/Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      REDIS_URL: redis://redis:6379
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: flight_search_db_project
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  booking-service:
    build:
      context: .
      dockerfile: bookingAndPaymentService/Dockerfile
    ports:
      - "5003:5003"
    environment:
      PORT: 5003
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      FLIGHT_SERVICE_URL: http://flight-service:5000
      RABBITMQ_URL: amqp://rabbitmq:5672
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: booking_service_db_project
      DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      flight-service:
        condition: service_started

  notification-service:
    build:
      context: .
      dockerfile: notificationService/Dockerfile
    ports:
      - "5004:5004"
    environment:
      PORT: 5004
      RABBITMQ_URL: amqp://rabbitmq:5672
      AUTH_SERVICE_URL: http://auth-service:5001
      FLIGHT_SERVICE_URL: http://flight-service:5000
      BOOKING_SERVICE_URL: http://booking-service:5003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: notification_service_db
      DB_HOST: postgres
    depends_on:
      rabbitmq:
        condition: service_healthy
      auth-service:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_AUTH_SERVICE_URL: http://localhost:5001
      VITE_FLIGHT_SERVICE_URL: http://localhost:5000
      VITE_BOOKING_SERVICE_URL: http://localhost:5003
      VITE_NOTIFICATION_SERVICE_URL: http://localhost:5004
    depends_on:
      - auth-service
      - flight-service
      - booking-service

volumes:
  pgdata:
